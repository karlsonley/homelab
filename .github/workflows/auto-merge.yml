name: Auto-merge

on:
  pull_request:
    types: [labeled]

jobs:
  enable-automerge:
    # Only act when the automerge-approved label is applied to a Renovate PR.
    # GitHub's native auto-merge then waits for all required checks before merging.
    if: >-
      github.event.label.name == 'automerge-approved' &&
      github.event.pull_request.user.login == 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --delete-branch
