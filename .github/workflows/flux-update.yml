name: update-flux
on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"
permissions:
  contents: write
  pull-requests: write
jobs:
  components:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
      - name: Check for updates
        id: update
        run: |
          flux install \
            --components-extra "image-reflector-controller,image-automation-controller" \
            --export > ./clusters/homelab/flux-system/gotk-components.yaml

          VERSION="$(flux -v)"
          echo "flux_version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update-flux
          commit-message: "chore(flux): update to ${{ steps.update.outputs.flux_version }}"
          title: "chore(flux): update to ${{ steps.update.outputs.flux_version }}"
          body: |
            chore(flux): update to ${{ steps.update.outputs.flux_version }}
