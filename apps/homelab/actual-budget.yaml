---
apiVersion: v1
kind: Namespace
metadata:
  name: actual-budget
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: actual-budget-oidc
  namespace: actual-budget
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: actual-budget-oidc
    template:
      type: Opaque
      data:
        oidc_client_id: "{{ .oidc_client_id }}"
        oidc_client_secret: "{{ .oidc_client_secret }}"
  data:
  - secretKey: oidc_client_id
    remoteRef:
      key: name:homelab
      property: pocket_id_oidc_client_id
      version: latest_enabled
  - secretKey: oidc_client_secret
    remoteRef:
      key: name:homelab
      property: pocket_id_oidc_client_secret
      version: latest_enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual-budget
  namespace: actual-budget
  annotations:
    secret.reloader.stakater.com/reload: "actual-budget-oidc"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: actual-budget
  template:
    metadata:
      labels:
        app.kubernetes.io/name: actual-budget
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: actual-budget
          image: actualbudget/actual-server:26.4.0
          ports:
            - containerPort: 5006
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          env:
            - name: ACTUAL_LOGIN_METHOD
              value: openid
            - name: ACTUAL_MULTIUSER
              value: "true"
            - name: ACTUAL_OPENID_DISCOVERY_URL
              value: https://pocket-id.sonley.dev/.well-known/openid-configuration
            - name: ACTUAL_OPENID_SERVER_HOSTNAME
              value: https://actual.sonley.dev
            - name: ACTUAL_OPENID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: actual-budget-oidc
                  key: oidc_client_id
            - name: ACTUAL_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: actual-budget-oidc
                  key: oidc_client_secret
            - name: ACTUAL_TOKEN_EXPIRATION
              value: openid-provider
          livenessProbe:
            httpGet:
              path: /
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 5006
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "25m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: actual-budget
---
apiVersion: v1
kind: Service
metadata:
  name: actual-budget
  namespace: actual-budget
  labels:
    app.kubernetes.io/name: actual-budget
spec:
  selector:
    app.kubernetes.io/name: actual-budget
  ports:
    - port: 5006
      targetPort: 5006
      name: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: actual-budget
  namespace: actual-budget
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Actual Budget"
    gethomepage.dev/description: "Finance and budgeting"
    gethomepage.dev/group: "Home"
    gethomepage.dev/icon: "actual-budget.png"
    gethomepage.dev/href: "https://actual.sonley.dev"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=actual-budget"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`actual.sonley.dev`)
      services:
        - kind: Service
          name: actual-budget
          namespace: actual-budget
          port: 5006
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: actual-budget
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: actual-budget
  updatePolicy:
    updateMode: "Off"
