apiVersion: v1
kind: Namespace
metadata:
  name: bentopdf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bentopdf
  namespace: bentopdf
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bentopdf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bentopdf
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: bentopdf
          matchLabelKeys:
            - pod-template-hash
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bentopdf
          image: ghcr.io/alam00000/bentopdf-simple:2.8.4
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bentopdf
  namespace: bentopdf
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bentopdf
---
apiVersion: v1
kind: Service
metadata:
  name: bentopdf
  namespace: bentopdf
  labels:
    app.kubernetes.io/name: bentopdf
spec:
  selector:
    app.kubernetes.io/name: bentopdf
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bentopdf
  namespace: bentopdf
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "BentoPDF"
    gethomepage.dev/description: "PDF Toolkit"
    gethomepage.dev/group: "More Applications"
    gethomepage.dev/icon: "si-adobeacrobatreader"
    gethomepage.dev/href: "https://bentopdf.sonley.dev"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=bentopdf"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`bentopdf.sonley.dev`)
      services:
        - kind: Service
          name: bentopdf
          namespace: bentopdf
          port: 8080
