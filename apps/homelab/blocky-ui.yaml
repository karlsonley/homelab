apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: blocky-ui
  name: blocky-ui
  namespace: blocky
  annotations:
    secret.reloader.stakater.com/reload: "blocky-db-password"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: blocky-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blocky-ui
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: blocky-ui
          matchLabelKeys:
            - pod-template-hash
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: blocky-ui
          image: ghcr.io/gabeduartem/blocky-ui:1.6.1
          env:
            - name: BLOCKY_API_URL
              value: "https://blocky.sonley.dev"
            - name: QUERY_LOG_TYPE
              value: "postgresql"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blocky-db-password
                  key: password
            - name: QUERY_LOG_TARGET
              value: "postgresql://blocky:$(DB_PASSWORD)@blocky-postgres-rw:5432/blocky?sslmode=disable"
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: blocky-ui
  namespace: blocky
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blocky-ui
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: blocky-ui
  name: blocky-ui
  namespace: blocky
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      protocol: TCP
      targetPort: 3000
  selector:
    app.kubernetes.io/name: blocky-ui
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: blocky-ui
  namespace: blocky
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Blocky UI"
    gethomepage.dev/description: "DNS Dashboard"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/icon: "blocky.png"
    gethomepage.dev/href: "https://blocky-ui.sonley.dev"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=blocky-ui"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`blocky-ui.sonley.dev`)
      middlewares:
        - name: oidc-auth
          namespace: traefik
      services:
        - kind: Service
          name: blocky-ui
          namespace: blocky
          port: 3000

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: blocky-ui
  namespace: blocky
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blocky-ui
  updatePolicy:
    updateMode: "Off"
