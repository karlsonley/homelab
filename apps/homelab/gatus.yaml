apiVersion: v1
kind: Namespace
metadata:
  name: gatus
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gatus-db-password
  namespace: gatus
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: scaleway-secret-manager
  target:
    name: gatus-db-password
    template:
      data:
        username: "gatus"
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      key: name:homelab
      property: gatus_db_password
      version: latest_enabled
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-credentials
  namespace: gatus
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-credentials
    template:
      data:
        access_key_id: "{{ .access_key_id }}"
        secret_access_key: "{{ .secret_access_key }}"
        region: "garage"
  data:
  - secretKey: access_key_id
    remoteRef:
      key: name:homelab
      property: cnpg_backup_access_key_id
      version: latest_enabled
  - secretKey: secret_access_key
    remoteRef:
      key: name:homelab
      property: cnpg_backup_secret_access_key
      version: latest_enabled
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: gatus-postgres
  namespace: gatus
spec:
  configuration:
    destinationPath: "s3://cnpg-backups/gatus-postgres"
    endpointURL: "http://10.0.2.100:3900"
    s3Credentials:
      accessKeyId:
        name: cnpg-backup-credentials
        key: access_key_id
      secretAccessKey:
        name: cnpg-backup-credentials
        key: secret_access_key
      region:
        name: cnpg-backup-credentials
        key: region
    wal:
      compression: gzip
    data:
      compression: gzip
  retentionPolicy: "30d"
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gatus-postgres
  namespace: gatus
spec:
  affinity:
    podAntiAffinityType: required
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  primaryUpdateStrategy: unsupervised
  storage:
    size: 5Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: gatus
      owner: gatus
      secret:
        name: gatus-db-password
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: gatus-postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: gatus
data:
  config.yaml: |
    web:
      port: 8080

    ui:
      title: "Homelab Status"
      header: "Service Health"
      logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/gatus.svg"
      link: "https://status.sonley.dev"

    alerting:
      ntfy:
        url: "http://ntfy.ntfy.svc.cluster.local"
        topic: "gatus"
        priority: 4
        default-alert:
          enabled: true
          failure-threshold: 3
          success-threshold: 2
          send-on-resolved: true

    storage:
      type: postgres
      path: "postgres://gatus:${GATUS_DB_PASSWORD}@gatus-postgres-rw:5432/gatus?sslmode=disable"

    connectivity:
      checker:
        target: 1.1.1.1:53
        interval: 1m

    # Default conditions for HTTP endpoints
    default-endpoint: &defaults
      interval: 1m
      conditions:
        - "[STATUS] >= 200"
        - "[STATUS] < 400"
        - "[RESPONSE_TIME] < 5000"
      alerts:
        - type: ntfy

    endpoints:
      # Infrastructure
      - name: Traefik
        group: Infrastructure
        url: "http://traefik.traefik:9100/metrics"
        <<: *defaults

      - name: Pocket-ID
        group: Infrastructure
        url: "https://pocket-id.sonley.dev/.well-known/openid-configuration"
        <<: *defaults

      - name: Blocky UI
        group: Applications
        url: "http://blocky-ui.blocky:3000"
        <<: *defaults

      - name: Blocky DNS
        group: Infrastructure
        url: "10.0.2.201:53"
        interval: 1m
        dns:
          query-name: "cloudflare.com"
          query-type: "A"
        conditions:
          - "[DNS_RCODE] == NOERROR"
        alerts:
          - type: ntfy

      - name: Grafana
        group: Infrastructure
        url: "https://grafana.sonley.dev/api/health"
        <<: *defaults

      - name: Prometheus
        group: Infrastructure
        url: "http://kube-prometheus-stack-prometheus.monitoring:9090/-/healthy"
        <<: *defaults

      - name: Alertmanager
        group: Infrastructure
        url: "http://kube-prometheus-stack-alertmanager.monitoring:9093/-/healthy"
        <<: *defaults

      - name: Longhorn
        group: Infrastructure
        url: "http://longhorn-frontend.longhorn:80"
        <<: *defaults

      - name: Homepage
        group: Infrastructure
        url: "https://homepage.sonley.dev"
        <<: *defaults

      # Applications
      - name: Glance
        group: Applications
        url: "https://glance.sonley.dev"
        <<: *defaults

      - name: Immich
        group: Applications
        url: "https://immich.sonley.dev/api/server/ping"
        <<: *defaults

      - name: Linkwarden
        group: Applications
        url: "https://linkwarden.sonley.dev"
        <<: *defaults

      - name: Mealie
        group: Applications
        url: "https://mealie.sonley.dev/api/app/about"
        <<: *defaults

      - name: Home Assistant
        group: Applications
        url: "https://home-assistant.sonley.dev"
        <<: *defaults

      - name: Home Assistant Observer
        group: Applications
        url: "http://10.0.2.251:4357"
        <<: *defaults

      - name: Proxmox
        group: Infrastructure
        url: "https://proxmox.sonley.dev"
        <<: *defaults

      - name: NAS
        group: Infrastructure
        url: "https://nas.sonley.dev"
        <<: *defaults

      - name: Homebox
        group: Applications
        url: "https://homebox.sonley.dev/api/v1/status"
        <<: *defaults

      - name: ntfy
        group: Applications
        url: "https://ntfy.sonley.dev/v1/health"
        <<: *defaults

      - name: Mail Archiver
        group: Applications
        url: "https://mail-archiver.sonley.dev"
        <<: *defaults


      - name: Actual Budget
        group: Applications
        url: "https://actual.sonley.dev"
        <<: *defaults

      - name: BentoPDF
        group: Applications
        url: "https://bentopdf.sonley.dev"
        <<: *defaults

      - name: Rackula
        group: Applications
        url: "https://rackula.sonley.dev"
        <<: *defaults

      - name: N8N
        group: Applications
        url: "http://n8n.n8n:5678/healthz"
        <<: *defaults

      - name: Papra
        group: Applications
        url: "http://papra.papra:1221"
        <<: *defaults

      - name: Vaultwarden
        group: Applications
        url: "https://vaultwarden.sonley.dev/alive"
        <<: *defaults

      - name: Speedtest Tracker
        group: Monitoring
        url: "http://speedtest-tracker.speedtest-tracker:80/api/healthcheck"
        <<: *defaults
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: gatus
  labels:
    app: gatus
  annotations:
    configmap.reloader.stakater.com/reload: "gatus-config"
    secret.reloader.stakater.com/reload: "gatus-db-password"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gatus
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gatus
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: gatus
        matchLabelKeys:
        - pod-template-hash
      containers:
      - name: gatus
        image: ghcr.io/twin/gatus:v5.35.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: GATUS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gatus-db-password
              key: password
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: config
          mountPath: /config/config.yaml
          subPath: config.yaml
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: gatus-config
      - name: data
        emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gatus
  namespace: gatus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gatus
---
apiVersion: v1
kind: Service
metadata:
  name: gatus
  namespace: gatus
  labels:
    app: gatus
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: gatus
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gatus
  namespace: gatus
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Status"
    gethomepage.dev/description: "Service Health"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/icon: "gatus.png"
    gethomepage.dev/href: "https://status.sonley.dev"
    gethomepage.dev/pod-selector: "app=gatus"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`status.sonley.dev`)
      middlewares:
        - name: oidc-auth
          namespace: traefik
      services:
        - kind: Service
          name: gatus
          namespace: gatus
          port: 8080

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: gatus
  namespace: gatus
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gatus
  updatePolicy:
    updateMode: "Off"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: gatus-postgres
  namespace: gatus
spec:
  schedule: "0 0 4 * * *"
  backupOwnerReference: self
  cluster:
    name: gatus-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: gatus-postgres
  namespace: gatus
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: gatus-postgres
  podMetricsEndpoints:
  - port: metrics
