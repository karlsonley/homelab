apiVersion: v1
kind: Namespace
metadata:
  name: immich
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-password
  namespace: immich
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: scaleway-secret-manager
  target:
    name: immich-db-password
    template:
      data:
        username: "immich"
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      key: name:homelab
      property: immich_db_password
      version: latest_enabled
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-config
  namespace: immich
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: scaleway-secret-manager
  target:
    name: immich-config
    template:
      data:
        immich.json: |
          {
            "oauth": {
              "enabled": true,
              "autoRegister": true,
              "autoLaunch": false,
              "buttonText": "Login with Pocket-ID",
              "clientId": "{{ .oidc_client_id }}",
              "clientSecret": "{{ .oidc_client_secret }}",
              "issuerUrl": "https://pocket-id.sonley.dev",
              "scope": "openid email profile"
            },
            "passwordLogin": {
              "enabled": false
            }
          }
  data:
  - secretKey: oidc_client_id
    remoteRef:
      key: name:homelab
      property: pocket_id_oidc_client_id
      version: latest_enabled
  - secretKey: oidc_client_secret
    remoteRef:
      key: name:homelab
      property: pocket_id_oidc_client_secret
      version: latest_enabled
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-credentials
  namespace: immich
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-credentials
    template:
      data:
        access_key_id: "{{ .access_key_id }}"
        secret_access_key: "{{ .secret_access_key }}"
        region: "garage"
  data:
  - secretKey: access_key_id
    remoteRef:
      key: name:homelab
      property: cnpg_backup_access_key_id
      version: latest_enabled
  - secretKey: secret_access_key
    remoteRef:
      key: name:homelab
      property: cnpg_backup_secret_access_key
      version: latest_enabled
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: immich-postgres
  namespace: immich
spec:
  configuration:
    destinationPath: "s3://cnpg-backups/immich-postgres"
    endpointURL: "http://10.0.2.100:3900"
    s3Credentials:
      accessKeyId:
        name: cnpg-backup-credentials
        key: access_key_id
      secretAccessKey:
        name: cnpg-backup-credentials
        key: secret_access_key
      region:
        name: cnpg-backup-credentials
        key: region
    wal:
      compression: gzip
    data:
      compression: gzip
  retentionPolicy: "30d"
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: immich
spec:
  affinity:
    podAntiAffinityType: required
  instances: 2
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18.3-1.1.1
  primaryUpdateStrategy: unsupervised
  postgresql:
    shared_preload_libraries:
      - vchord.so
  storage:
    size: 20Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-password
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-postgres
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: immich-postgres
  namespace: immich
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: immich-postgres
  podMetricsEndpoints:
  - port: metrics
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library-nfs
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: immich-nfs
  mountOptions:
    - nfsvers=3
    - hard
    - timeo=600
    - retrans=2
    - actimeo=30
    - lookupcache=positive
  nfs:
    server: 10.0.2.100
    path: /volume1/immich/library
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
  namespace: immich
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: immich-nfs
  resources:
    requests:
      storage: 500Gi
  volumeName: immich-library-nfs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-redis
  namespace: immich
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-redis
  template:
    metadata:
      labels:
        app: immich-redis
      annotations:
        backup.velero.io/backup-volumes-excludes: data
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: redis
        image: docker.io/valkey/valkey:9.0.3-alpine
        resources:
          requests:
            cpu: "25m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 6379
          name: redis
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - valkey-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: immich-redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-redis-data
  namespace: immich
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: immich-redis
  namespace: immich
spec:
  selector:
    app: immich-redis
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
      annotations:
        backup.velero.io/backup-volumes-excludes: cache,config,hf-cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: machine-learning
        image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
        resources:
          requests:
            cpu: "100m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "8Gi"
        ports:
        - containerPort: 3003
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        startupProbe:
          tcpSocket:
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          tcpSocket:
            port: 3003
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 3003
          periodSeconds: 5
          failureThreshold: 3
        env:
        - name: DB_HOSTNAME
          value: immich-postgres-rw
        - name: DB_USERNAME
          value: immich
        - name: DB_DATABASE_NAME
          value: immich
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: immich-db-password
              key: password
        - name: REDIS_HOSTNAME
          value: immich-redis
        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: config
          mountPath: /.config
        - name: hf-cache
          mountPath: /.cache
      volumes:
      - name: cache
        persistentVolumeClaim:
          claimName: immich-ml-cache
      - name: config
        emptyDir: {}
      - name: hf-cache
        emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-ml-cache
  namespace: immich
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  selector:
    app: immich-machine-learning
  ports:
  - port: 3003
    targetPort: 3003
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-server
      annotations:
        backup.velero.io/backup-volumes-excludes: library
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: immich-server
          matchLabelKeys:
            - pod-template-hash
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/immich-app/immich-server:v2.7.5
          resources:
            requests:
              cpu: "50m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          ports:
            - containerPort: 2283
              name: http
            - containerPort: 8081
              name: metrics
          startupProbe:
            tcpSocket:
              port: 2283
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 2283
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 2283
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_HOSTNAME
              value: immich-postgres-rw
            - name: DB_USERNAME
              value: immich
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db-password
                  key: password
            - name: REDIS_HOSTNAME
              value: immich-redis
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning:3003
            - name: IMMICH_TELEMETRY_INCLUDE
              value: "all"
            - name: IMMICH_CONFIG_FILE
              value: /config/immich.json
          volumeMounts:
            - name: library
              mountPath: /usr/src/app/upload
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: immich-library
        - name: config
          secret:
            secretName: immich-config
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: immich-server
  namespace: immich
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-server
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-server
spec:
  selector:
    app.kubernetes.io/name: immich-server
  ports:
  - port: 2283
    targetPort: 2283
    name: http
  - port: 8081
    targetPort: 8081
    name: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: immich
  namespace: monitoring
  labels:
    app: immich
    app.kubernetes.io/name: immich
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-server
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - immich
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: immich-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: immich
    rules:
    - alert: ImmichServerDown
      expr: up{job="immich"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Immich server is down"
        description: "Immich photo server has been unreachable for more than 5 minutes."
    - alert: ImmichHighJobQueueDepth
      expr: immich_jobs_waiting > 1000
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "Immich job queue is backing up"
        description: "Immich has more than 1000 jobs waiting in the queue for over 30 minutes."
    - alert: ImmichDatabaseConnectionErrors
      expr: rate(immich_api_errors_total{error_type="database"}[5m]) > 0.1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Immich database connection errors"
        description: "Immich is experiencing database connection errors."
    - alert: ImmichStorageNearlyFull
      expr: (kubelet_volume_stats_used_bytes{persistentvolumeclaim="immich-library"} / kubelet_volume_stats_capacity_bytes{persistentvolumeclaim="immich-library"}) > 0.85
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "Immich storage nearly full"
        description: "Immich library storage is more than 85% full."
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich
  namespace: immich
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Immich"
    gethomepage.dev/description: "Photo Management"
    gethomepage.dev/group: "Home"
    gethomepage.dev/icon: "immich.png"
    gethomepage.dev/href: "https://immich.sonley.dev"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=immich-server"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`immich.sonley.dev`)
      services:
        - kind: Service
          name: immich-server
          namespace: immich
          port: 2283

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: immich-redis
  namespace: immich
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: immich-redis
  updatePolicy:
    updateMode: "Off"

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: immich-machine-learning
  updatePolicy:
    updateMode: "Off"

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: immich-server
  namespace: immich
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: immich-server
  updatePolicy:
    updateMode: "Off"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: immich-postgres
  namespace: immich
spec:
  schedule: "0 20 3 * * *"
  backupOwnerReference: self
  cluster:
    name: immich-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
