---
apiVersion: v1
kind: Namespace
metadata:
  name: papra
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: papra-data
  namespace: papra
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: papra-documents-nfs
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: papra-nfs
  mountOptions:
    - nfsvers=3
    - hard
    - timeo=600
    - retrans=2
    - actimeo=30
    - lookupcache=positive
  nfs:
    server: 10.0.2.100
    path: /volume1/papra/documents
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: papra-documents
  namespace: papra
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: papra-nfs
  resources:
    requests:
      storage: 100Gi
  volumeName: papra-documents-nfs
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: papra-secrets
  namespace: papra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: papra-secrets
    template:
      type: Opaque
      data:
        auth_secret: "{{ .auth_secret }}"
        auth_providers_customs: '[{"providerId":"pocket-id","providerName":"Pocket ID","clientId":"{{ .oidc_client_id }}","clientSecret":"{{ .oidc_client_secret }}","type":"oidc","discoveryUrl":"https://pocket-id.sonley.dev/.well-known/openid-configuration","scopes":["openid","profile","email"]}]'
  data:
  - secretKey: auth_secret
    remoteRef:
      key: name:homelab
      property: papra_auth_secret
      version: latest_enabled
  - secretKey: oidc_client_id
    remoteRef:
      key: name:homelab
      property: pocket_id_oidc_client_id
      version: latest_enabled
  - secretKey: oidc_client_secret
    remoteRef:
      key: name:homelab
      property: pocket_id_oidc_client_secret
      version: latest_enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: papra
  namespace: papra
  annotations:
    secret.reloader.stakater.com/reload: "papra-secrets"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: papra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: papra
      annotations:
        backup.velero.io/backup-volumes-excludes: documents
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: papra
          image: ghcr.io/papra-hq/papra:26.4.0-rootless
          ports:
            - containerPort: 1221
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          env:
            - name: APP_BASE_URL
              value: https://papra.sonley.dev
            - name: TRUSTED_ORIGINS
              value: https://papra.sonley.dev
            - name: AUTH_IP_ADDRESS_HEADERS
              value: x-forwarded-for
            - name: AUTH_IS_REGISTRATION_ENABLED
              value: "false"
            - name: AUTH_PROVIDERS_EMAIL_IS_ENABLED
              value: "false"
            - name: DOCUMENT_STORAGE_DRIVER
              value: filesystem
            - name: DOCUMENT_STORAGE_FILESYSTEM_ROOT
              value: /documents
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: papra-secrets
                  key: auth_secret
            - name: AUTH_PROVIDERS_CUSTOMS
              valueFrom:
                secretKeyRef:
                  name: papra-secrets
                  key: auth_providers_customs
          startupProbe:
            httpGet:
              path: /
              port: 1221
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 1221
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 1221
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: data
              mountPath: /app/app-data
            - name: documents
              mountPath: /documents
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: papra-data
        - name: documents
          persistentVolumeClaim:
            claimName: papra-documents
---
apiVersion: v1
kind: Service
metadata:
  name: papra
  namespace: papra
  labels:
    app.kubernetes.io/name: papra
spec:
  selector:
    app.kubernetes.io/name: papra
  ports:
    - port: 1221
      targetPort: 1221
      name: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: papra
  namespace: papra
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Papra"
    gethomepage.dev/description: "Document Management"
    gethomepage.dev/group: "Productivity"
    gethomepage.dev/icon: "papra.png"
    gethomepage.dev/href: "https://papra.sonley.dev"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=papra"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`papra.sonley.dev`)
      services:
        - kind: Service
          name: papra
          namespace: papra
          port: 1221
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: papra
  namespace: papra
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: papra
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: papra
  namespace: papra
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: papra
  updatePolicy:
    updateMode: "Off"
