---
apiVersion: v1
kind: Namespace
metadata:
  name: proxmox
---
apiVersion: v1
kind: Service
metadata:
  name: proxmox
  namespace: proxmox
spec:
  clusterIP: None
  ports:
    - port: 8006
      targetPort: 8006
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: proxmox
  namespace: proxmox
  labels:
    kubernetes.io/service-name: proxmox
addressType: IPv4
endpoints:
  - addresses:
      - 10.0.2.128
ports:
  - port: 8006
    protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox
  namespace: proxmox
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`proxmox.sonley.dev`)
      kind: Rule
      services:
        - kind: Service
          name: proxmox
          namespace: proxmox
          port: 8006
