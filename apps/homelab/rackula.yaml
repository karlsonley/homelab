---
apiVersion: v1
kind: Namespace
metadata:
  name: rackula
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rackula-data
  namespace: rackula
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rackula
  namespace: rackula
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rackula
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rackula
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rackula
          image: ghcr.io/rackulalives/rackula:0.9.4
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: CORS_ORIGIN
              value: "https://rackula.sonley.dev"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rackula-data
---
apiVersion: v1
kind: Service
metadata:
  name: rackula
  namespace: rackula
  labels:
    app.kubernetes.io/name: rackula
spec:
  selector:
    app.kubernetes.io/name: rackula
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rackula
  namespace: rackula
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Rackula"
    gethomepage.dev/description: "Rack layout designer"
    gethomepage.dev/group: "Systems"
    gethomepage.dev/icon: "mdi-server-network"
    gethomepage.dev/href: "https://rackula.sonley.dev"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=rackula"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`rackula.sonley.dev`)
      kind: Rule
      services:
        - kind: Service
          name: rackula
          namespace: rackula
          port: 8080

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: rackula
  namespace: rackula
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rackula
  updatePolicy:
    updateMode: "Off"
