apiVersion: v1
kind: Namespace
metadata:
  name: speedtest-tracker
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: speedtest-tracker
  namespace: speedtest-tracker
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: scaleway-secret-manager
  target:
    name: speedtest-tracker
    template:
      type: Opaque
      data:
        app_key: "{{ .app_key }}"
  data:
  - secretKey: app_key
    remoteRef:
      key: name:homelab
      property: speedtest_tracker_app_key
      version: latest_enabled
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: speedtest-tracker-db-password
  namespace: speedtest-tracker
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: scaleway-secret-manager
  target:
    name: speedtest-tracker-db-password
    template:
      data:
        username: "speedtest"
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      key: name:homelab
      property: speedtest_tracker_db_password
      version: latest_enabled
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-credentials
  namespace: speedtest-tracker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-credentials
    template:
      data:
        access_key_id: "{{ .access_key_id }}"
        secret_access_key: "{{ .secret_access_key }}"
  data:
  - secretKey: access_key_id
    remoteRef:
      key: name:homelab
      property: cnpg_backup_access_key_id
      version: latest_enabled
  - secretKey: secret_access_key
    remoteRef:
      key: name:homelab
      property: cnpg_backup_secret_access_key
      version: latest_enabled
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: speedtest-tracker-postgres
  namespace: speedtest-tracker
spec:
  affinity:
    podAntiAffinityType: required
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  primaryUpdateStrategy: unsupervised
  storage:
    size: 5Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: speedtest
      owner: speedtest
      secret:
        name: speedtest-tracker-db-password
  backup:
    barmanObjectStore:
      destinationPath: "s3://cnpg-backups/speedtest-tracker-postgres"
      endpointURL: "http://10.0.2.100:3900"
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-credentials
          key: access_key_id
        secretAccessKey:
          name: cnpg-backup-credentials
          key: secret_access_key
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: speedtest-tracker-postgres
  namespace: speedtest-tracker
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: speedtest-tracker-postgres
  podMetricsEndpoints:
  - port: metrics
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: speedtest-tracker-config
  namespace: speedtest-tracker
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest-tracker
  namespace: speedtest-tracker
  labels:
    app: speedtest-tracker
  annotations:
    secret.reloader.stakater.com/reload: "speedtest-tracker,speedtest-tracker-db-password"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speedtest-tracker
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: speedtest-tracker
    spec:
      containers:
      - name: speedtest-tracker
        image: lscr.io/linuxserver/speedtest-tracker:1.14.0
        ports:
        - containerPort: 80
          name: http
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Europe/Amsterdam"
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: speedtest-tracker
              key: app_key
        - name: APP_URL
          value: "https://speedtest.sonley.dev"
        - name: DB_CONNECTION
          value: "pgsql"
        - name: DB_HOST
          value: "speedtest-tracker-postgres-rw"
        - name: DB_PORT
          value: "5432"
        - name: DB_DATABASE
          value: "speedtest"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: speedtest-tracker-db-password
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: speedtest-tracker-db-password
              key: password
        - name: SPEEDTEST_SCHEDULE
          value: "0 */6 * * *"
        - name: DISPLAY_TIMEZONE
          value: "Europe/Amsterdam"
        - name: PRUNE_RESULTS_OLDER_THAN
          value: "365"
        - name: PUBLIC_DASHBOARD
          value: "true"
        volumeMounts:
        - name: config
          mountPath: /config
        livenessProbe:
          httpGet:
            path: /api/healthcheck
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/healthcheck
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "25m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: speedtest-tracker-config
---
apiVersion: v1
kind: Service
metadata:
  name: speedtest-tracker
  namespace: speedtest-tracker
  labels:
    app: speedtest-tracker
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
  selector:
    app: speedtest-tracker
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: speedtest-tracker
  namespace: speedtest-tracker
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Speedtest Tracker"
    gethomepage.dev/description: "Internet Performance"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/icon: "speedtest-tracker.png"
    gethomepage.dev/href: "https://speedtest.sonley.dev"
    gethomepage.dev/pod-selector: "app=speedtest-tracker"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`speedtest.sonley.dev`)
      middlewares:
        - name: oidc-auth
          namespace: traefik
      services:
        - kind: Service
          name: speedtest-tracker
          namespace: speedtest-tracker
          port: 80

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: speedtest-tracker
  namespace: speedtest-tracker
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: speedtest-tracker
  updatePolicy:
    updateMode: "Off"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: speedtest-tracker-postgres
  namespace: speedtest-tracker
spec:
  schedule: "0 20 4 * * *"
  backupOwnerReference: self
  cluster:
    name: speedtest-tracker-postgres
