---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docs-repo-credentials
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: docs-repo-credentials
    template:
      data:
        username: "karl"
        password: "{{ .token }}"
  data:
  - secretKey: token
    remoteRef:
      key: name:homelab
      property: docs_repo_token
      version: latest_enabled
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: docs
  namespace: flux-system
spec:
  interval: 1h
  url: https://forgejo.sonley.dev/karl/docs.git
  secretRef:
    name: docs-repo-credentials
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: docs
  namespace: flux-system
spec:
  dependsOn:
    - name: apps
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: docs
  path: ./k8s
  prune: true
  wait: true
