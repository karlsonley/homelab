apiVersion: v1
kind: Namespace
metadata:
  name: pocket-id
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 500Mi
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: pocket-id
    template:
      type: Opaque
      data:
        encryption_key: "{{ .encryption_key}}"
  data:
  - secretKey: encryption_key
    remoteRef:
      key: name:homelab
      property: pocket_id_encryption_key
      version: latest_enabled
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pocket-id-db-password
  namespace: pocket-id
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: pocket-id-db-password
    template:
      data:
        username: "pocketid"
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      key: name:homelab
      property: pocket_id_db_password
      version: latest_enabled
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-credentials
  namespace: pocket-id
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: cnpg-backup-credentials
    template:
      data:
        access_key_id: "{{ .access_key_id }}"
        secret_access_key: "{{ .secret_access_key }}"
  data:
  - secretKey: access_key_id
    remoteRef:
      key: name:homelab
      property: cnpg_backup_access_key_id
      version: latest_enabled
  - secretKey: secret_access_key
    remoteRef:
      key: name:homelab
      property: cnpg_backup_secret_access_key
      version: latest_enabled
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pocket-id-postgres
  namespace: pocket-id
spec:
  affinity:
    podAntiAffinityType: required
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  primaryUpdateStrategy: unsupervised
  storage:
    size: 5Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: pocketid
      owner: pocketid
      secret:
        name: pocket-id-db-password
  backup:
    barmanObjectStore:
      destinationPath: "s3://cnpg-backups/pocket-id-postgres"
      endpointURL: "http://10.0.2.100:3900"
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-credentials
          key: access_key_id
        secretAccessKey:
          name: cnpg-backup-credentials
          key: secret_access_key
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
  monitoring:
    enablePodMonitor: true
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: pocket-id-postgres
  namespace: pocket-id
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: pocket-id-postgres
  podMetricsEndpoints:
  - port: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: pocket-id
  name: pocket-id
  namespace: pocket-id
  annotations:
    secret.reloader.stakater.com/reload: "pocket-id,pocket-id-db-password"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pocket-id
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: pocket-id
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
      - name: pocket-id
        image: ghcr.io/pocket-id/pocket-id:v2.6.2
        env:
        - name: APP_URL
          value: "https://pocket-id.sonley.dev"
        - name: TRUST_PROXY
          value: "true"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: pocket-id
              key: encryption_key
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pocket-id-db-password
              key: password
        - name: DB_CONNECTION_STRING
          value: "postgres://pocketid:$(DB_PASSWORD)@pocket-id-postgres-rw:5432/pocketid"
        - name: FILE_BACKEND
          value: "database"
        resources:
          requests:
            cpu: "25m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 1411
          name: http
        startupProbe:
          httpGet:
            path: /
            port: 1411
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /
            port: 1411
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 1411
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: pocket-id
  name: pocket-id
  namespace: pocket-id
spec:
  ports:
    - name: "1411"
      port: 1411
      targetPort: 1411
  selector:
    app: pocket-id
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pocket-id
  namespace: pocket-id
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Pocket ID"
    gethomepage.dev/description: "OIDC Provider"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/icon: "pocket-id.png"
    gethomepage.dev/href: "https://pocket-id.sonley.dev"
    gethomepage.dev/pod-selector: "app=pocket-id"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`pocket-id.sonley.dev`)
      services:
        - kind: Service
          name: pocket-id
          namespace: pocket-id
          port: 1411
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: pocket-id
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pocket-id
  updatePolicy:
    updateMode: "Off"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pocket-id-postgres
  namespace: pocket-id
spec:
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: pocket-id-postgres
