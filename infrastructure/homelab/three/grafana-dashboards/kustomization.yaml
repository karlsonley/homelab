apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

configMapGenerator:
- name: grafana-dashboards
  files:
  - dashboards/blocky.json
  - dashboards/blocky-query.json
  - dashboards/cert-manager.json
  - dashboards/external-secrets.json
  - dashboards/kubernetes-monitoring-dashboard.json
  - dashboards/metallb.json
  - dashboards/traefik.json
  - dashboards/cloudnative-pg.json
  - dashboards/hwmon.json
  options:
    disableNameSuffixHash: true
- name: grafana-dashboards-nodes
  files:
  - dashboards/node-exporter-full.json
  options:
    disableNameSuffixHash: true
