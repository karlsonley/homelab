apiVersion: v1
kind: Namespace
metadata:
  name: velero
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vmware-tanzu
  namespace: flux-system
spec:
  interval: 1h
  url: https://vmware-tanzu.github.io/helm-charts
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: velero-credentials
    template:
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key }}
          aws_secret_access_key={{ .secret_key }}
        kopia_password: "{{ .kopia_password }}"
  data:
  - secretKey: access_key
    remoteRef:
      key: name:homelab
      property: velero_aws_access_key_id
      version: latest_enabled
  - secretKey: secret_key
    remoteRef:
      key: name:homelab
      property: velero_aws_secret_access_key
      version: latest_enabled
  - secretKey: kopia_password
    remoteRef:
      key: name:homelab
      property: velero_kopia_password
      version: latest_enabled
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: flux-system
spec:
  releaseName: velero
  targetNamespace: velero
  interval: 30m
  chart:
    spec:
      chart: velero
      version: "11.4.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
      interval: 5m
  values:
    kubectl:
      image:
        tag: "1.33.4"
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: stkmsvelerobackups
          config:
            region: nl-ams
            s3ForcePathStyle: true
            s3Url: https://s3.nl-ams.scw.cloud
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: nl-ams
      defaultBackupStorageLocation: default
      defaultVolumeSnapshotLocations: aws:default
      features: EnableCSI
      defaultSnapshotMoveData: true
      uploaderType: kopia
      defaultVolumesToFsBackup: true
      extraEnvVars:
        - name: KOPIA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: velero-credentials
              key: kopia_password
    credentials:
      useSecret: true
      existingSecret: velero-credentials
    snapshotsEnabled: true
    deployNodeAgent: true
    nodeAgent:
      podVolumePath: /var/lib/kubelet/pods
    schedules:
      daily-backup:
        disabled: false
        schedule: "0 2 * * *"
        useOwnerReferencesInBackup: false
        paused: false
        template:
          ttl: 720h
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - velero
            - ollama
          includeClusterResources: true
          snapshotMoveData: true
          storageLocation: default
          volumeSnapshotLocations:
            - default
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
