---
apiVersion: v1
kind: Namespace
metadata:
  name: vpa
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: autoscaler
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes.github.io/autoscaler
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vpa
  namespace: flux-system
spec:
  releaseName: vpa
  targetNamespace: vpa
  interval: 30m
  chart:
    spec:
      chart: vertical-pod-autoscaler
      version: "0.8.1"
      sourceRef:
        kind: HelmRepository
        name: autoscaler
      interval: 5m
  values:
    admissionController:
      replicas: 1
      podDisruptionBudget:
        enabled: false
    recommender:
      replicas: 1
      podDisruptionBudget:
        enabled: false
    updater:
      enabled: false
