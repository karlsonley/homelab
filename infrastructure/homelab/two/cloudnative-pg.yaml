---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudnative-pg
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 1h
  url: https://cloudnative-pg.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  releaseName: cloudnative-pg
  targetNamespace: cloudnative-pg
  interval: 30m
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.28.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  values:
    monitoring:
      podMonitorEnabled: true
      podMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-barman-cloud-plugin
  namespace: flux-system
spec:
  releaseName: cnpg-barman-cloud-plugin
  targetNamespace: cloudnative-pg
  interval: 30m
  dependsOn:
    - name: cloudnative-pg
  chart:
    spec:
      chart: plugin-barman-cloud
      version: "0.6.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
